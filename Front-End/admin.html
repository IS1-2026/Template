<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administrador | GolAhora</title>

  <link rel="stylesheet" href="./css/Admin/admin.css">
  <link rel="stylesheet" href="./css/global/toast.css">
  <script type="module" src="./main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body> 
  <div class="dashboard">

    <aside class="sidebar">
      <h2>Gol<span>Ahora</span></h2>

      <nav>
        <a href="#"> Dashboard</a>
        <a href="#canchas"> Canchas</a>
        <a href="#"> Reservas</a>
        <a href="#"> Usuarios</a>
      </nav>
    </aside>

    <main class="main">

      <header class="topbar">
        <h1>Panel de Administración</h1>
        <div class="user">👤 Admin</div>
      </header>

      <section class="stats">
        <div class="card">
          <h3>Reservas hoy</h3>
          <p>24</p>
        </div>

        <div class="card">
          <h3>Canchas activas</h3>
          <p>12</p>
        </div>

        <div class="card">
          <h3>Usuarios</h3>
          <p>320</p>
        </div>

        <div class="card">
          <h3>Ingresos</h3>
          <p>$45.000</p>
        </div>
      </section>

      <section class="table-section" id="canchas">

        <div class="section-header">
          <h2>Listado de canchas</h2>
         

          <button class="btn-primary">
            + Nueva cancha
          </button>
        </div>
         Endpoint para ver todas las canchas creadas
      </section>

      <section class="form-section" id="crear">

        <h2>Crear nueva cancha</h2>

        <form class="form-grid" id="form-cancha">

          <div class="form-group">
            <label>Nombre</label>
            <input id="nombre" type="text" placeholder="Cancha Central">
          </div>

          <div class="form-group">
            <label>Tipo</label>

            <select id="tipos">
              <option value="2">Fútbol 5</option>
              <option value="1">Fútbol 7</option>
              <option>Fútbol 11</option>
            </select>
          </div>

          <div class="form-group">
            <label>Horario de inicio</label>

            <input id="horaInicio" type="time">
          </div>

          <div class="form-group">
            <label>Horario de cierre</label>

            <input id="horaFin" type="time">
          </div>

          <button type="submit" class="btn-primary">
            Crear cancha
          </button>

        </form>
      </section>

      <section class="table-section" id="tiposCancha">
         <form class="form-grid" id="form-tipo-cancha">

          <div class="form-group">
            <label>Nombre</label>
            <input id="nombreTipoCancha" type="text" placeholder="Cancha de 5">
          </div>

          <div class="form-group">
            <label>Superficie</label>
            <input id="superficie" type="text" placeholder="Sintetico">
          </div>  

          <div class="form-group">
            <label>Capacidad</label>
            <input id="capacidad" type="number" min="1" placeholder="10">
          </div>  
          <div class="form-group">
            <label>Duración (En horas)</label>
            <input id="duracion" type="number" min="1" placeholder="1">
          </div>  
          <div class="form-group">
            <label>Precio</label>
            <input id="precio" type="number" min="1" placeholder="10000">
          </div>  

          <button type="submit" class="btn-primary">
            Crear tipo de cancha
          </button>

        </form>
       
      </section>

    </main>
  </div>

</body>
</html>
